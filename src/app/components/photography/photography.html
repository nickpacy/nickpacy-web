<section class="photography section" id="photography">
  <div class="container">

    <div class="section-header">
      <span class="section-label">Beyond the Code</span>
      <h2>Photography</h2>
      <p>When I'm not building software, I'm usually out with a camera. Here are a few favorites.</p>
    </div>

    <div class="photography__grid">
      @for (photo of photos; track photo.alt; let i = $index) {
        <div class="photography__item" [class.photography__item--tall]="photo.tall">
          @if (photo.src) {
            <img [src]="photo.src" [alt]="photo.alt" class="photography__img" loading="lazy" />
          } @else {
            <!-- Placeholder until real photos are added -->
            <div class="photography__placeholder" [attr.aria-label]="photo.alt">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </div>
          }
          @if (photo.caption) {
            <div class="photography__caption">{{ photo.caption }}</div>
          }
        </div>
      }
    </div>

  </div>
</section>
