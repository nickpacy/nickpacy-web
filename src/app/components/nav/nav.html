<nav class="nav" [class.scrolled]="scrolled()">
  <div class="nav__inner container">

    <!-- Logo / Name -->
    <a href="#" class="nav__logo" (click)="closeMenu()">
      <span class="nav__logo-bracket">&lt;</span>
      <span class="nav__logo-name">NP</span>
      <span class="nav__logo-bracket">/&gt;</span>
    </a>

    <!-- Desktop Links -->
    <ul class="nav__links">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" class="nav__link">{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- Actions -->
    <div class="nav__actions">
      <!-- Theme Toggle -->
      <button
        class="nav__theme-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="'Switch to ' + (theme.resolvedTheme() === 'dark' ? 'light' : 'dark') + ' mode'"
        title="Toggle theme"
      >
        @if (theme.resolvedTheme() === 'dark') {
          <!-- Sun icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Hamburger (mobile) -->
      <button class="nav__hamburger" (click)="toggleMenu()" [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'">
        <span [class.open]="menuOpen()"></span>
      </button>
    </div>

  </div>

  <!-- Mobile Menu -->
  <div class="nav__mobile" [class.open]="menuOpen()">
    <ul>
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" class="nav__link" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
    </ul>
  </div>
</nav>

<!-- Spacer so content doesn't hide under fixed nav -->
<div class="nav-spacer"></div>
